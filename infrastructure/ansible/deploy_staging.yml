---
- name: 2. CONFIGURE Docker and Deploy Application on Staging Environment
  hosts: docker_vm # Target the host group created by the Terraform inventory plugin
  become: yes
  gather_facts: yes

  vars:
    docker_users: ["ubuntu"]
    docker_install_compose: true
    project_root: "/home/ubuntu/app"
    local_compose_path: "{{ playbook_dir }}/../../"

  pre_tasks:
    - name: Verzeichnis für App erstellen
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

  roles:
    - role: geerlingguy.docker
      tags: [docker_install]

  tasks:
    - name: Docker-Compose Datei kopieren
      ansible.posix.synchronize:
        src: "{{ local_compose_path }}"
        dest: "{{ project_root }}"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.ssh"
          - "--exclude=.git"
          - "--exclude=.history"
          - "--exclude=docker-compose.override.yml"
          - "--exclude=node_modules"
          - "--exclude=__pycache__"
          - "--exclude=.venv"
          - "--exclude=.terraform"
          - "--exclude=frontend/dist"
          - "--exclude=frontend/test-results"
          - "--exclude=frontend/blob-report"
          # model_files/*.gguf is multi-GB; the docker-compose model-downloader
          # service fetches the model on the VM, so we never ship it via rsync.
          - "--exclude=model_files"
          - "--exclude=.DS_Store"
          - "--exclude=*.pyc"

    - name: Start the application with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        files: ["docker-compose.yml"]  # Specify the staging compose file
        # Custom images (llm-model-generator-api, frontend, …) live only in
        # the compose `build:` contexts — no registry — so pull always fails
        # for them. `build: always` makes compose build them on the VM.
        build: always
        state: present
      register: compose_output

    - name: Status der Deployment anzeigen
      ansible.builtin.debug:
        var: compose_output