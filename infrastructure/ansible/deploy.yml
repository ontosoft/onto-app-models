---
- name: 2. CONFIGURE Docker and Deploy Application
  hosts: docker_vm # Target the host group created by the Terraform inventory plugin
  become: yes
  gather_facts: yes

  vars:
    docker_users: ["ubuntu"]
    docker_install_compose: true
    project_root: "/home/ubuntu/app"
    local_compose_path: "{{ playbook_dir }}/../"

  pre_tasks:
    - name: Verzeichnis für App erstellen
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

  roles:
    - role: geerlingguy.docker
      tags: [docker_install]

  tasks:
    - name: Docker-Compose Datei kopieren
      ansible.posix.synchronize:
        src: "{{ local_compose_path }}"
        dest: "{{ project_root }}"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.ssh"
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=__pycache__"
          - "--exclude=.venv"
          - "--exclude=.DS_Store"
          - "--exclude=*.pyc"

    - name: Applikation mit Docker Compose starten
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        state: present
      register: compose_output

    - name: Status der Deployment anzeigen
      ansible.builtin.debug:
        var: compose_output