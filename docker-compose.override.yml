  llm-model-generator-api:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: llm-model-generator/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./llm-model-generator
          action: sync
          target: /app/llm-model-generator
          ignore:
            - ./llm-model-generator/.venv
            - .venv
        - path: ./llm-model-generator/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./llm-model-generator/htmlcov:/app/llm-model-generator/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "5173:5173"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # Stop at the Bun build-stage (no nginx) so we can run the Vite dev server.
      target: build-stage
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=development
    # Override the image CMD: run the Vite dev server with hot reload.
    command: bun run dev -- --host --port 5173
    # `docker compose watch` syncs ./frontend into the container so HMR fires
    # on file changes (node_modules stays the one installed in the image).
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app/frontend
          ignore:
            - node_modules

    # --- Production-style build (nginx serving dist/) — uncomment to switch back
    #     and comment out the dev block above (no target -> full nginx image):
    # ports:
    #   - "5173:80"
    # build:
    #   context: .
    #   dockerfile: frontend/Dockerfile
    #   args:
    #     - VITE_API_URL=http://localhost:8000
    #     - NODE_ENV=development

 
  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - llm-model-generator-api
      - mailcatcher
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - 9323:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
