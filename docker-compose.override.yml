services:

  # Local services are available on their ports, but also available on:
  # http://api.localhost.tiangolo.com: backend
  # http://dashboard.localhost.tiangolo.com: frontend
  # etc. To enable it, update .env, set:
  # DOMAIN=localhost.tiangolo.com
  proxy:
    image: traefik:3.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    # Duplicate the command from docker-compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  ollama-webui:
    restart: "no"
    ports:
      - "8035:8000"


  db:
    restart: "no"
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  adminer:
    restart: "no"
    ports:
      - "8080:8080"

  backend-onto:
    restart: "no"
    ports:
      - "8089:8089"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/
          ignore:
            - ./backend/venv
            - venv


  llm-model-generator-api:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: llm-model-generator/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./llm-model-generator
          action: sync
          target: /app/llm-model-generator
          ignore:
            - ./llm-model-generator/.venv
            - .venv
        - path: ./llm-model-generator/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./llm-model-generator/htmlcov:/app/llm-model-generator/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "5173:80"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=development

    # In the case that docker compose watch function is used, the command in the Dockerfile is overridden to run the development server, and the source code is synced with the container. This allows for hot reloading of the frontend code during development.
    # for the development 
    # ports:
    #   - "5173:5173"
    # build:
    #   context: .
    #   dockerfile: frontend/Dockerfile
    #   target: build-stage
    #   args:
    #     - VITE_API_URL=http://localhost:8000
    #     - NODE_ENV=development
    # command: bun run dev -- --host --port 5173
    # develop:
    #   watch:
    #     - path: ./frontend
    #       action: sync
    #       target: /app/frontend
    #       ignore:
    #         - node_modules

  frontend-onto:
    restart: "no"
    ports:
      - "3000:3000"
    build:
      context: .
      dockerfile: frontend1/Dockerfile

  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - llm-model-generator-api
      - mailcatcher
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - 9323:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
